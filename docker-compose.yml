version: '3.8'

services:
  backend-csharp:
    build: 
      context: ./path/to/your/csharp/project
      dockerfile: Dockerfile.csharp
    ports:
      - "5000:5000"
    networks:
      - profinet-net

  profinet-python:
    build:
      context: ./path/to/your/python/project
      dockerfile: Dockerfile.python
    environment:
      - IFACE_NAME=enp0s8
      - TARGET_NAME=PN-Device
      # gRPC сервер теперь доступен по имени контейнера
      - GRPC_SERVER=backend-csharp:5000 
    
    # ВАЖНО: Для scapy нужен доступ к сети хоста (чтобы видеть реальный адаптер enp0s8)
    network_mode: "host" 
    
    # Требуется для работы с сырыми сокетами
    cap_add:
      - NET_ADMIN
      - NET_RAW
    
    depends_on:
      - backend-csharp

networks:
  profinet-net:
    driver: bridge