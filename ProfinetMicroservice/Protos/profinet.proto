syntax = "proto3";

option csharp_namespace = "ProfinetApi.GrpcClients";

package profinet;

service ProfinetStackService {
  rpc StartStack (StartRequest) returns (StartResponse);
  rpc StopStack (StopRequest) returns (StopResponse);
  rpc StreamIoData (stream IoWriteRequest) returns (stream IoUpdateResponse);
}

message StartRequest {
  string interface_name = 1;
  string station_name = 2;
}

message StartResponse {
  bool success = 1;
  string error_message = 2;
}

message StopRequest {}
message StopResponse {
  bool success = 1;
}

message IoWriteRequest {
  int32 offset = 1;
  bytes data = 2;
}

message IoUpdateResponse {
  int32 offset = 1;
  bytes data = 2;
  bool is_good_quality = 3;
}