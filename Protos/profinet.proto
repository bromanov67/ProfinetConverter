syntax = "proto3";

service ProfinetService {
    rpc StreamPayload (stream PayloadRequest) returns (PayloadResponse);
}

service ProfinetController {
    rpc StartBrute (StartRequest) returns (StartResponse);
    rpc StopBrute (StopRequest) returns (StopResponse);
}

message StartRequest {
    string interface_name = 1;
    string target_name = 2;
    int32 module_ident = 3;     
    int32 submodule_ident = 4;  
    int32 input_length = 5;     
    int32 output_length = 6;    
}

message StartResponse { 
    bool success = 1; 
    string message = 2; 
}
message StopRequest {}
message StopResponse { 
    bool success = 1; 
    string message = 2; 
}

message PayloadRequest {
    bytes payload = 1;
    int32 cycle_counter = 2;
    int32 data_status = 3;
    int32 transfer_status = 4;
}
message PayloadResponse { 
    bool success = 1; 
}